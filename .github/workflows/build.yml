name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Run cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          # Ad-hoc sign (identity "-") — no Apple Developer account required.
          # Users can bypass Gatekeeper with:
          #   xattr -dr com.apple.quarantine "/Applications/USMCC Publicity Helper.app"
          APPLE_SIGNING_IDENTITY: '-'

      - name: Build distribution DMG with README
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/release/bundle/macos/USMCC Publicity Helper.app"
          DMG_DIR="$RUNNER_TEMP/usmcc-dmg"
          OUT_DMG="$GITHUB_WORKSPACE/USMCC-Publicity-Helper-macOS.dmg"
          rm -rf "$DMG_DIR"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"
          cp "docs/UNSIGNED_MAC_README.txt" "$DMG_DIR/README.txt"
          ln -s /Applications "$DMG_DIR/Applications"
          # -ov overwrites the output file if a previous step/run already created it.
          hdiutil create \
            -volname "USMCC Publicity Helper" \
            -srcfolder "$DMG_DIR" \
            -ov \
            -format UDZO \
            "$OUT_DMG"

      - name: Zip .app bundle
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r "$GITHUB_WORKSPACE/USMCC-Publicity-Helper.app.zip" "USMCC Publicity Helper.app"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: USMCC-Publicity-Helper-macOS-app
          path: USMCC-Publicity-Helper.app.zip
          retention-days: 30

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: USMCC-Publicity-Helper-macOS-dmg
          path: USMCC-Publicity-Helper-macOS.dmg
          retention-days: 30
