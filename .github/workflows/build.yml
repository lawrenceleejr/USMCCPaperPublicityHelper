name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Swift Tests
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Run tests
        run: swift test

  build:
    name: Build macOS App
    runs-on: macos-14
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme USMCCPaperPublicityHelper \
            -configuration Release \
            -archivePath build/USMCCPaperPublicityHelper.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO
      - name: Export app
        run: |
          mkdir -p build/export
          cp -R build/USMCCPaperPublicityHelper.xcarchive/Products/Applications/USMCCPaperPublicityHelper.app \
               build/export/
          cd build/export
          zip -r ../USMCCPaperPublicityHelper.app.zip USMCCPaperPublicityHelper.app
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: USMCCPaperPublicityHelper-macOS
          path: build/USMCCPaperPublicityHelper.app.zip
          retention-days: 30
