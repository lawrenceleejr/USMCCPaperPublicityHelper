name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Run cargo tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          # Build unsigned — no Apple Developer account required.
          # Users can bypass Gatekeeper with:
          #   xattr -d com.apple.quarantine "USMCC Publicity Helper.app"
          APPLE_SIGNING_IDENTITY: ''

      - name: Zip .app bundle
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r "$GITHUB_WORKSPACE/USMCC-Publicity-Helper.app.zip" "USMCC Publicity Helper.app"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: USMCC-Publicity-Helper-macOS-app
          path: USMCC-Publicity-Helper.app.zip
          retention-days: 30

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: USMCC-Publicity-Helper-macOS-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 30
